<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Article Intelligence</title>

<!-- FONT (MOET BUITEN STYLE!) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f4f3ff;
  --surface: #ffffff;
  --surface2: #f8f7ff;
  --border: rgba(124,58,237,0.1);
  --border-strong: rgba(124,58,237,0.22);
  --accent: #7c3aed;
  --accent-light: #a78bfa;
  --accent-glow: rgba(124,58,237,0.07);
  --text: #1e1b4b;
  --muted: #6b7280;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:50px 20px;
}

/* grid achtergrond */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:radial-gradient(rgba(124,58,237,0.07) 1px,transparent 1px);
  background-size:28px 28px;
  pointer-events:none;
}

/* layout */
.container{
  max-width:900px;
  margin:auto;
  position:relative;
  z-index:1;
}

/* typography */
h1{
  font-family:'Inter',sans-serif;
  font-size:42px;
  font-weight:800;
  margin-bottom:10px;
}

h2{
  font-family:'Inter',sans-serif;
  font-size:18px;
  margin-bottom:10px;
}

.subtitle{
  color:var(--muted);
  margin-bottom:40px;
}

p, ul{
  color:var(--muted);
  line-height:1.7;
}

/* cards */
.card{
  background:var(--surface);
  padding:26px;
  margin-top:20px;
  border-radius:16px;
  border:1px solid var(--border);
  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
  border:1px solid var(--border-strong);
  box-shadow:0 10px 30px rgba(124,58,237,0.1);
}

/* badge */
.badge{
  background:var(--accent-glow);
  color:var(--accent);
  padding:5px 10px;
  border-radius:6px;
  font-size:11px;
  font-weight:700;
  margin-bottom:10px;
  display:inline-block;
}

/* images */
img{
  width:100%;
  border-radius:12px;
  margin-top:15px;
  border:1px solid var(--border);
}

/* back link */
.back{
  display:inline-block;
  margin-bottom:25px;
  text-decoration:none;
  color:var(--accent);
  font-weight:600;
}

/* BUTTON FIX */
a[style],
button {
  background: linear-gradient(135deg,#7c3aed,#5b21b6) !important;
  color:#fff !important;
  border:none !important;
  border-radius:10px !important;
  padding:12px 20px !important;
  text-decoration:none !important;
  font-weight:600 !important;
  display:inline-block;
}

a[style]:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(124,58,237,0.25);
}
</style>
